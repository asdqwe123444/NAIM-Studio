<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07070f">
<link rel="manifest" href="manifest.json">
<title>Exit Test</title>
<style>
body { background:#0d0d1a; color:#efefff; font-family:monospace; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:20px; margin:0; }
button { padding:16px 32px; font-size:18px; border-radius:10px; border:none; cursor:pointer; width:260px; }
.b1 { background:#ff6b35; color:#fff; }
.b2 { background:#3e3e70; color:#fff; }
.b3 { background:#2de080; color:#0d0d1a; }
#log { font-size:12px; color:#6060a0; margin-top:20px; text-align:center; }
</style>
</head>
<body>
<h2 style="color:#ff6b35;">PWA 종료 테스트</h2>
<button class="b1" onclick="test1()">① window.close()</button>
<button class="b2" onclick="test2()">② history.back()</button>
<button class="b3" onclick="test3()">③ history.go(-length)</button>
<div id="log">버튼 누르면 결과 표시</div>
<script>
function log(msg){ document.getElementById('log').innerText = msg; }
function test1(){ log('window.close() 시도...'); try{ window.close(); log('window.close() 호출됨 - 안 꺼지면 실패'); }catch(e){ log('오류: '+e); } }
function test2(){ log('history.back() 시도...'); history.back(); setTimeout(()=>log('history.back() - 안 꺼지면 실패'),500); }
function test3(){ log('history.go(-'+window.history.length+') 시도...'); window.history.go(-window.history.length); setTimeout(()=>log('history.go() - 안 꺼지면 실패'),500); }
</script>
</body>
</html>
